# This file provides platform-specific MPI configuration.
# It is read only when the MPIRequirement is used.

# See: https://github.com/common-workflow-language/cwltool/blob/8949fc2d68efe128ce841739d1190645dbd233bb/README.rst#running-mpi-based-tools-that-need-to-be-launched
# - runner (mpirun, srun, ...)
# - nproc_flag (-n, -np, ...)
# - default_nproc
# - extra_flags
# - env_pass,
# - env_pass_regex
# - env_set

# Example specifying srun as MPI launcher instead of the default mpirun.
runner: srun
nproc_flag: "-n"

# To avoid --preserve-entire-environment, we pass the environment variables
# necessary for srun to work. In MN5 we pass the Intel MPI and the MPICH
# variables (Intel is a MPICH-vartiant).
env_pass_regex: ["SLURM_.*", "I_MPI.*", "MPI_.*", "MPICH_.*", "FI_PROVIDER_PATH", "LD_LIBRARY_PATH"]
