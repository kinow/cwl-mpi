# This file provides platform-specific MPI configuration.
# It is read only when the MPIRequirement is used.

# See: https://github.com/common-workflow-language/cwltool/blob/8949fc2d68efe128ce841739d1190645dbd233bb/README.rst#running-mpi-based-tools-that-need-to-be-launched
# - runner (mpirun, srun, ...)
# - nproc_flag (-n, -np, ...)
# - default_nproc
# - extra_flags
# - env_pass,
# - env_pass_regex
# - env_set

# Example specifying srun as MPI launcher instead of the default mpirun.
runner: srun
nproc_flag: "-n"
# Using --mpi=pmi2 works for srun but fails for mpicc.
# Ditto for using --mpi=cray_shasta.
# If you load cray-mpich-abi, mpicc is also not available.
extra_flags: ["--partition=debug"]

# To avoid --preserve-entire-environment, we pass the environment variables
# necessary for srun to work. In LUMI, we pass the SLURM and CRAY environment
# variables, and also LD_LIBRARY_PATH as that is needed for libfabric.
env_pass_regex: ["SLURM_.*", "CRAY_.*", "LD_LIBRARY_PATH", "PMI_.*", "MPICH.*"]
